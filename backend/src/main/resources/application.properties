# Stat Backend Configuration
quarkus.http.port=8081

# InfluxDB Configuration
stat.influxdb.url=http://localhost:8086
stat.influxdb.token=super_secret_dev_token
stat.influxdb.org=stat_home
stat.influxdb.bucket=garmin_data

# LLM Configuration (Google AI Studio / Gemini)
stat.llm.base-url=https://generativelanguage.googleapis.com
stat.llm.api-key=${GEMINI_API_KEY:changeme}
stat.llm.model=gemini-2.5-flash
stat.llm.temperature=0.7
stat.llm.max-tokens=2000

# User Profile Configuration (loaded from environment variables)
stat.user.name=${STAT_USER_NAME:User}
stat.user.goal=${STAT_USER_GOAL:Improve overall health and fitness}
stat.user.diet=${STAT_USER_DIET:Balanced diet}
stat.user.metrics=${STAT_USER_METRICS:Standard metrics}
stat.user.persona=${STAT_USER_PERSONA:You are a helpful and motivating coach}

# Timeout for external services (ms)
stat.external.timeout-ms=15000

# Quarkus REST Client Configuration for LLM
quarkus.rest-client.llm.url=${stat.llm.base-url}
quarkus.rest-client.llm.scope=jakarta.inject.Singleton
quarkus.rest-client.llm.read-timeout=${stat.external.timeout-ms}
quarkus.rest-client.llm.connect-timeout=2000

# CORS
quarkus.http.cors=true
quarkus.http.cors.origins=http://localhost:5173
quarkus.http.cors.headers=accept, authorization, content-type, x-requested-with
